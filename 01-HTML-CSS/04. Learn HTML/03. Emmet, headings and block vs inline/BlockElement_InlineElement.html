<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block and Inline level</title>
</head>
<body>

    <div>
        <h1>These are Block level elements</h1>
        <ul>
            <li>Heading h1 to h6</li>
            <li>paragraph p</li>
            <li>list ol,ul,li</li>
        </ul>
    </div>

    <div>
        <h1>These are Inline level elements</h1>
        <ol>
            <li>a tags</li>
            <li>Image</li>
            <li>strong</li>
            <li>em</li>
        </ol>
    </div>
</body>
</html>
