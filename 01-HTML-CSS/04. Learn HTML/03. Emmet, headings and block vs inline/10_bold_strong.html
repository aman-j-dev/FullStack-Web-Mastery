<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>strong , b</title>
</head>
<body>
    <h1>strong tags</h1>

    <p>Lorem ipsum dolor sit amet <strong>consectetur</strong> adipisicing elit.</p>

    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. <b>Asperiores</b> eaque, soluta sint quibusdam quaerat suscipit?</p>
</body>
</html>


<!-- strong make word bold               but it conveys Importance -->
 <!-- b tag is also same make bold       on the other hand its just representation-->
