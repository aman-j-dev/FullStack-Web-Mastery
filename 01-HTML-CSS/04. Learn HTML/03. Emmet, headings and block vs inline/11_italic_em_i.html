<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italic em , i</title>
</head>
<body>
    <h1>Italic em , i</h1>

    <p>Lorem ipsum, dolor sit amet <em>consectetur adipisicing</em> elit. Dicta, nulla fugit unde iusto architecto facilis?</p>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ad <i>repellat sint rem</i> similique ea eveniet fugit temporibus totam quis.</p>
</body>
</html>

<!-- <em> is a semantic tag used to indicate stress emphasis or importance in the text. -->

<!-- <i> is a presentational tag -->
