<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend><h1>YOUR FAVOURITE FOOD</h1></legend>
        <form action="">

            <label for="favFood">Select your favourite food : </label>

            <select name="food" id="favFood">
                <option value="">choose a food</option>
                <hr>
                <optgroup label="Fruit">
                    <option value="mango">Mango</option>
                    <option value="banana">Banana</option>
                    <option value="watermelon">WaterMelon</option>
                    <option value="apples">Apples</option>
                </optgroup>
                <hr>
                <optgroup label="Dish">
                    <option value="matarpaneer">Matar Paneer</option>
                    <option value="butterchicken">Butter Chicken</option>
                    <option value="rajma">Rajma</option>
                    <option value="biryani">Biryani</option>
                </optgroup>
                <hr>
                <optgroup label="Shakes">
                    <option value="mangoshake">Mango Shake</option>
                    <option value="oreoshake">Oreo Shake</option>
                    <option value="blackcurrant">Black Currant</option>
                    <option value="chocolateshake">Chocolate Shake</option>
                </optgroup>
            </select>
        </form>
    </fieldset>
</body>
</html>
