<!-- 
Will be in this form         input is inside label block

    <form action="">

        <label for=""></label>
        <input type="text" name="" id="">

    </form> 


In this we have to link FOR (of label) to ID (of input)       FOR and ID must be same to link
if we click on label text it will directly transfer cursor inside input box like text , textarea

##for and id are like key value pair it is for browser 
##name refer to DB attribute in backend

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>LOGIN PAGE</h1>
    <hr>
    <br>
    

    <form action="">
        <label for="Email">Email : </label>
        <input type="email" name="email" id="Email">
        
        <label for="Password">Password : </label>
        <input type="password" name="password" id="Password">

        <br><br>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
