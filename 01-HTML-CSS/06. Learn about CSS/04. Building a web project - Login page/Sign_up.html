<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign UP</title>
    <style>
        body{
            background-color: rgb(30, 30, 30);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: rgb(214, 214, 214);
            border-radius: 7px;
            padding: 20px;
            width: 450px;
        }
        .card h1{
            text-align: center;
            color: rgb(2, 2, 201);
            margin-top: 25px;
            margin-bottom: 30px;
        }
        .card form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card .radioForm{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card .formGrp{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .card .formGrp input{
            border-radius: 5px;
            border: 1px solid black;
            width: 300px;
            padding: 6px 10px;
            box-sizing: border-box;
        }
        .card button{
            cursor: pointer;
            color: rgb(255, 255, 255);
            border-radius: 5px;
            border: 1px solid black;
            background-color: rgb(50, 177, 246);
            padding: 7px;
        }
        .card .genderOpts {
        display: flex;
        gap: 15px; 
        width: 300px; 
}
        .card .chk{
            text-align: center;
        }
        .card p{
            text-align: center;
        }
        .card button:hover{
            background-color: rgb(23, 23, 229);
        }
        

    </style>
</head>
<body>
    <div class="card">
        <h1>Sign Up</h1>
        <form action="">
            <div class="formGrp">
                <label for="name"><b>Your Name : </b></label>
                <input type="text" name="Name" id="name" placeholder="Your Full Name" required>
            </div>
            <div class="formGrp">
                <label for="email"><b>Email Id : </b></label>
                <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="formGrp">
                <label for="phone"><b>Phone No : </b></label>
                <input type="tel" name="phone" id="phone" placeholder="98765-XXXXX" required>
            </div>
            <div class="formGrp">
                <label for="Password"><b>Password : </b></label>
                <input type="password" name="password" id="Password" placeholder="Create Password" required>
            </div>
            <div class="formGrp">
                <label for="cfPassword"><b>Confirm Password : </b></label>
                <input type="password" name="cfpassword" id="cfPassword" placeholder="Repeat Password" required>
            </div>
            <div class="radioForm">
                <label><b>Gender : </b></label>
                <div class="genderOpts">
                    <label><input type="radio" name="gender" value="male" required> Male</label>
                    <label><input type="radio" name="gender" value="female" required> Female</label>
                </div>
            </div>
            <div class="chk">
                <label><input type="checkbox" name="terms" required>I agree to the Terms and Conditions</label>
            </div>
                <button type="submit">Sign Up</button>
        </form>
        <p>Already a member ? <a href="./login_page.html">Sign In</a></p>
    </div>
</body>
</html>
