<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(30, 30, 30);
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
        .card{
            background-color: rgb(214, 214, 214);
            width: 350px;
            padding: 20px; 
            border-radius: 7px;
        }
        .card h1{
            margin-top: 25px;
            margin-bottom: 30px;
            text-align: center;
            color: rgb(2, 2, 201);
        }
        .card form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card .formGrp{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .card input{
            border: 1.25px solid black;
            border-radius: 5px;
            padding: 6px 10px;
            width: 257px;
            box-sizing: border-box;
        }
        .card form button{
            cursor: pointer;
            color: rgb(255, 255, 255);
            border-radius: 5px;
            border: 1px solid black;
            background-color: rgb(50, 177, 246);
            padding: 7px;
        }
        .card form button:hover{
            background-color: rgb(23, 23, 229);
        }
        .card p{
            margin: 0;
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
    
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <form action="">
            <div class="formGrp">
                <label for="mail"><b>Email : </b></label>
                <input type="text" name="email" id="mail" placeholder="example@gmail.com">
            </div>
            <div class="formGrp">    
                <label for="pass"><b>Password : </b></label>
                <input type="password" name="password" id="pass" placeholder="PASSWORD">
            </div>
                <button type="submit">Login</button>
        </form>
        <p>New Here! <a href="./Sign_up.html">Sign up</a></p>
    </div>
</body>
</html>
