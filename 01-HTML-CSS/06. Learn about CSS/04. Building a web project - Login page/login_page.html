<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login_page</title>
    <style>
        body{
            background-color: rgb(33, 32, 32);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif ;
            margin: 0px;
            padding: 0px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: rgb(209, 209, 209);
            border-radius: 10px;
            padding: 20px;
            width: 35%;
        }
        .card h1{
            color: #1a50a0;
            text-align: center;
            margin-bottom: 25px;
        }
        .card form{
            display: flex;
            flex-direction: column;
        }
        .card input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid black;
            background-color: #d8d8d8;
        }
        .card button{
            background-color: #1b81da;
            color: #fff;
            padding: 10px;
            border-radius: 8px;            
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>LOGIN</h1>
        <form action="">
            <label for=""><b>Email : </b>
                <input type="text" name="email" id="" placeholder="example@gmail.com">
            </label>
            <label for=""><b>Password : </b>
                <input type="text" name="ppassword" id="" placeholder="PASSWORD">
            </label>
            <button type="submit">Submit</button>
        </form>
        <p>
            New Here ! <a href="./signUp.html">Sign Up</a>
        </p>
    </div>

</body>
</html>
